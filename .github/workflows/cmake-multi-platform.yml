name: CMake Multi-Platform Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Fixado em ubuntu-22.04 para consistência com os workflows de release
        # (linuxdeployqt requer glibc compatível com Ubuntu 22.04)
        os: [ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        arch: ${{ matrix.os == 'windows-latest' && 'win64_msvc2019_64' || '' }}
        setup-python: 'false'
        cache: 'true' # Evita baixar ~1-2 GB do Qt a cada run

    # Dependências extras apenas para o Linux
    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxcb-cursor0 \
          libxkbcommon-x11-0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-render-util0 \
          libxcb-xinerama0 \
          libxcb-xinput0 \
          libxcb-xfixes0 \
          libgl1-mesa-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }}

    - name: Test
      working-directory: ${{ github.workspace }}/build
      shell: bash
      run: |
        if [ -f CTestTestfile.cmake ]; then
          ctest -C ${{ env.BUILD_TYPE }}
        else
          echo "Sem testes para executar."
        fi
