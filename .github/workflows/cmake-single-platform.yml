name: CMake Multi-Platform Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Define os sistemas operacionais solicitados
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    # Passo crucial: Instalar o Qt (necessário para compilar seu app PDI)
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.*' # Instala a versão mais recente do Qt 6
        host: ${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows' }}
        target: 'desktop'
        # No Linux, precisamos de bibliotecas extras para interface gráfica
        setup-python: 'false'

    # Dependências extras para o Linux (necessárias para o Qt rodar no Ubuntu)
    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    # Opcional: Testes (apenas se tiver testes definidos no CMake)
    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}}