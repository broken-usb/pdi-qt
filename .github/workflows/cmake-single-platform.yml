name: CMake Multi-Platform Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    # --- CONFIGURAÇÃO LINUX ---
    - name: Install Qt & Deps (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y qt6-base-dev qt6-base-private-dev libgl1-mesa-dev

    # --- CONFIGURAÇÃO WINDOWS ---
    - name: Set Qt Path (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        # Busca automaticamente a pasta do Qt 6 dentro de C:\Qt
        $qtPath = Get-ChildItem -Path "C:\Qt\6*" | Select-Object -First 1
        if ($qtPath) {
            $cmakePath = "$($qtPath.FullName)\msvc2019_64"
            echo "QT_ROOT=$cmakePath" >> $env:GITHUB_ENV
            echo "CMAKE_PREFIX_PATH=$cmakePath" >> $env:GITHUB_ENV
            Write-Host "Qt encontrado em: $cmakePath"
        } else {
            Write-Error "Qt6 não encontrado em C:\Qt"
        }

    - name: Configure CMake
      # Adicionamos o -DQt6_DIR explicitamente para não haver erro
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_PREFIX_PATH="${{env.QT_ROOT}}"

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test
      working-directory: ${{github.workspace}}/build
      shell: bash
      run: |
        if [ -f CTestTestfile.cmake ]; then
          ctest -C ${{env.BUILD_TYPE}}
        else
          echo "No tests defined, skipping."
        fi