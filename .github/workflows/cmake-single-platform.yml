name: CMake Multi-Platform Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    # Instalação do Qt de forma robusta
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3' # Versão estável específica
        arch: ${{ matrix.os == 'windows-latest' && 'win64_msvc2019_64' || '' }}
        # Se o Python falhar, esta versão da action tentará métodos alternativos
        setup-python: 'false' 

    # Dependências extras apenas para o Linux
    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0 libgl1-mesa-dev

    - name: Configure CMake
      # O 'install-qt-action' define automaticamente as variáveis para o CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test
      working-directory: ${{github.workspace}}/build
      shell: bash
      run: |
        if [ -f CTestTestfile.cmake ]; then
          ctest -C ${{env.BUILD_TYPE}}
        else
          echo "Sem testes para executar."
        fi