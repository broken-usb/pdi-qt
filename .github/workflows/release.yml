name: Gerar Release Portátil

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag da Versão (ex: v1.0.0 ou v1.0.0-beta)'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: 'Marcar como Pre-Release?'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ==========================================
  # 1. BUILD WINDOWS (Gera o ZIP Portátil)
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        arch: 'win64_msvc2019_64'
        setup-python: 'false'
        cache: 'true'

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Empacotar Executável (windeployqt)
      shell: pwsh
      run: |
        mkdir deploy
        copy build\Release\PDI-qt.exe deploy\

        # --no-translations reduz o tamanho do ZIP removendo arquivos de
        # tradução do Qt que não são utilizados pelo projeto
        windeployqt --release --compiler-runtime --no-translations deploy\PDI-qt.exe

        Compress-Archive -Path deploy\* -DestinationPath PDI-Qt-Windows.zip

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: PDI-Qt-Windows.zip

  # ==========================================
  # 2. BUILD LINUX (Gera o .AppImage)
  # ==========================================
  build-linux:
    # Fixado em ubuntu-22.04: o linuxdeployqt foi compilado contra a glibc
    # desta versão. Usar ubuntu-latest (24.04) pode gerar incompatibilidades.
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        setup-python: 'false'
        cache: 'true'

    - name: Install Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxcb-cursor0 \
          libxkbcommon-x11-0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-render-util0 \
          libxcb-xinerama0 \
          libxcb-xinput0 \
          libxcb-xfixes0 \
          libgl1-mesa-dev \
          fuse

    - name: Configure & Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Verificar ícone
      run: |
        if [ ! -f icone.png ]; then
          echo "::warning::icone.png não encontrado na raiz do repositório. O AppImage usará um ícone padrão."
        fi

    - name: Criar AppImage (linuxdeployqt)
      run: |
        mkdir -p AppDir/usr/bin \
                 AppDir/usr/share/applications \
                 AppDir/usr/share/icons/hicolor/256x256/apps

        cp build/PDI-qt AppDir/usr/bin/

        # Criação do atalho Linux via heredoc (mais legível e seguro que
        # múltiplos echo encadeados)
        cat > AppDir/usr/share/applications/PDI-qt.desktop << 'EOF'
        [Desktop Entry]
        Name=PDI-Qt
        Exec=PDI-qt
        Icon=PDI-qt
        Type=Application
        Categories=Graphics;
        Comment=Ferramenta avançada de Processamento Digital de Imagens em Qt
        EOF

        # Copia o ícone customizado (se existir) para a pasta do AppImage
        if [ -f icone.png ]; then
          cp icone.png AppDir/usr/share/icons/hicolor/256x256/apps/PDI-qt.png
        fi

        wget -c -nv "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
        chmod a+x linuxdeployqt-continuous-x86_64.AppImage
        ./linuxdeployqt-continuous-x86_64.AppImage AppDir/usr/share/applications/PDI-qt.desktop -appimage

        mv PDI-Qt*.AppImage PDI-Qt-Linux.AppImage

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: PDI-Qt-Linux.AppImage

  # ==========================================
  # 3. CRIAR RELEASE NO GITHUB
  # ==========================================
  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-22.04
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Release no GitHub
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: "${{ github.event.inputs.prerelease == 'true' && 'Pre-Release' || 'Release' }} ${{ github.event.inputs.version }}"
        draft: false
        prerelease: ${{ github.event.inputs.prerelease }}
        generate_release_notes: true
        files: |
          ./artifacts/windows-build/PDI-Qt-Windows.zip
          ./artifacts/linux-build/PDI-Qt-Linux.AppImage
