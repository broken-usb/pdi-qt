name: Gerar Release Portatil

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag da Versão (ex: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  # ==========================================
  # 1. BUILD WINDOWS (Gera o ZIP Portátil)
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        arch: 'win64_msvc2019_64'
        setup-python: 'false'

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Empacotar Executavel (windeployqt)
      shell: pwsh
      run: |
        mkdir deploy
        # Alterado para respeitar as maiúsculas do CMakeLists.txt
        copy build\Release\PDI-qt.exe deploy\
        
        windeployqt --release --compiler-runtime deploy\PDI-qt.exe
        
        Compress-Archive -Path deploy\* -DestinationPath PDI-Qt-Windows.zip

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: PDI-Qt-Windows.zip

  # ==========================================
  # 2. BUILD LINUX (Gera o .AppImage)
  # ==========================================
  build-linux:
    runs-on: ubuntu-latest 
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        setup-python: 'false'

    - name: Install Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0 libgl1-mesa-dev fuse

    - name: Configure & Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Criar AppImage (linuxdeployqt)
      run: |
        mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
        
        # Corrigido: 'PDI-qt' com maiúsculas exatamente como no CMakeLists.txt
        cp build/PDI-qt AppDir/usr/bin/
        
        # Criação do atalho Linux com o nome do executável exato
        echo "[Desktop Entry]" > AppDir/usr/share/applications/PDI-qt.desktop
        echo "Name=PDI-Qt" >> AppDir/usr/share/applications/PDI-qt.desktop
        echo "Exec=PDI-qt" >> AppDir/usr/share/applications/PDI-qt.desktop
        echo "Icon=PDI-qt" >> AppDir/usr/share/applications/PDI-qt.desktop
        echo "Type=Application" >> AppDir/usr/share/applications/PDI-qt.desktop
        echo "Categories=Graphics;" >> AppDir/usr/share/applications/PDI-qt.desktop
        
        touch AppDir/usr/share/icons/hicolor/256x256/apps/PDI-qt.png
        
        wget -c -nv "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
        chmod a+x linuxdeployqt-continuous-x86_64.AppImage
        ./linuxdeployqt-continuous-x86_64.AppImage AppDir/usr/share/applications/PDI-qt.desktop -appimage
        
        mv PDI_Qt*.AppImage PDI-Qt-Linux.AppImage

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: PDI-Qt-Linux.AppImage

  # ==========================================
  # 3. CRIAR RELEASE NO GITHUB
  # ==========================================
  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Release no GitHub
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: "Release ${{ github.event.inputs.version }}"
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          ./artifacts/windows-build/PDI-Qt-Windows.zip
          ./artifacts/linux-build/PDI-Qt-Linux.AppImage
