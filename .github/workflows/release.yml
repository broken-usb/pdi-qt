name: Gerar Release Portatil

# O "workflow_dispatch" cria um botão no GitHub para você disparar manualmente
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag da Versão (ex: v1.0.0)'
        required: true
        default: 'v1.0.0'

# Permissão necessária para o GitHub Actions criar a página de Release
permissions:
  contents: write

jobs:
  # ==========================================
  # 1. BUILD WINDOWS (Gera o ZIP Portátil)
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        arch: 'win64_msvc2019_64'
        setup-python: 'false'

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Empacotar Executavel (windeployqt)
      shell: pwsh
      run: |
        # Cria uma pasta de deploy e copia o exe para lá
        # IMPORTANTE: Confirme se o nome do seu executável é "pdi-qt.exe" mesmo. 
        # Se for "ProjetoPDI.exe", altere aqui!
        mkdir deploy
        copy build\Release\pdi-qt.exe deploy\
        
        # O windeployqt busca todas as DLLs do Qt e joga na pasta
        windeployqt --release --compiler-runtime deploy\pdi-qt.exe
        
        # Zipa a pasta para ficar portátil
        Compress-Archive -Path deploy\* -DestinationPath PDI-Qt-Windows.zip

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: PDI-Qt-Windows.zip

  # ==========================================
  # 2. BUILD LINUX (Gera o .AppImage)
  # ==========================================
  build-linux:
    # Usamos o Ubuntu 20.04 para garantir que o AppImage rode em distribuições mais antigas e novas
    runs-on: ubuntu-20.04 
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        setup-python: 'false'

    - name: Install Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0 libgl1-mesa-dev fuse

    - name: Configure & Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Criar AppImage (linuxdeployqt)
      run: |
        # Prepara a estrutura de pastas do AppImage
        mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
        
        # Copia o executável (Altere 'pdi-qt' se o nome do seu projeto for outro)
        cp build/pdi-qt AppDir/usr/bin/
        
        # Cria um arquivo Desktop (necessário para o Linux reconhecer como App)
        echo "[Desktop Entry]" > AppDir/usr/share/applications/pdi-qt.desktop
        echo "Name=PDI-Qt" >> AppDir/usr/share/applications/pdi-qt.desktop
        echo "Exec=pdi-qt" >> AppDir/usr/share/applications/pdi-qt.desktop
        echo "Icon=pdi-qt" >> AppDir/usr/share/applications/pdi-qt.desktop
        echo "Type=Application" >> AppDir/usr/share/applications/pdi-qt.desktop
        echo "Categories=Graphics;" >> AppDir/usr/share/applications/pdi-qt.desktop
        
        # Ícone vazio temporário para não dar erro
        touch AppDir/usr/share/icons/hicolor/256x256/apps/pdi-qt.png
        
        # Baixa e roda o linuxdeployqt
        wget -c -nv "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
        chmod a+x linuxdeployqt-continuous-x86_64.AppImage
        ./linuxdeployqt-continuous-x86_64.AppImage AppDir/usr/share/applications/pdi-qt.desktop -appimage
        
        # Renomeia o resultado para o nome final
        mv PDI_Qt*.AppImage PDI-Qt-Linux.AppImage

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: PDI-Qt-Linux.AppImage

  # ==========================================
  # 3. CRIAR RELEASE NO GITHUB
  # ==========================================
  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Release no GitHub
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: "Release ${{ github.event.inputs.version }}"
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          ./artifacts/windows-build/PDI-Qt-Windows.zip
          ./artifacts/linux-build/PDI-Qt-Linux.AppImage
